{% extends 'base.html' %}
{% block nav_dashboard %}active{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Dashboard</h2>
    <p>Your financial overview</p>
</div>

<div id="messageDiv"></div>

<!-- ── MONTH FILTER ── -->
<div class="card" style="margin-bottom:20px;">
    <div style="display:flex; align-items:flex-end; gap:14px; flex-wrap:wrap;">
        <div class="form-group" style="margin-bottom:0; flex:1; min-width:200px;">
            <label>Filter by Month</label>
            <input type="month" id="monthFilter">
        </div>
        <button class="btn-primary" onclick="loadDashboard()">Apply</button>
        <button class="btn-outline" id="clearMonthBtn">Clear</button>
    </div>
</div>

<!-- ── SUMMARY CARDS ── -->
<div class="grid-2" style="margin-bottom:20px;">
    <div class="stat-card">
        <div class="label">Total Expense</div>
        <div class="value text-red" id="totalExpense">— 0.00</div>
    </div>
    <div class="stat-card">
        <div class="label">Remaining Budget</div>
        <div class="value text-green" id="remainingBudget">— 0.00</div>
    </div>
</div>

<!-- ── CATEGORY BREAKDOWN TABLE ── -->
<div class="card">
    <div class="section-title">Category Breakdown</div>
    <div style="overflow-x:auto;">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Spent</th>
                    <th>Budget</th>
                    <th>Remaining</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="categoryTable">
                <tr><td colspan="5" class="loading-cell">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
