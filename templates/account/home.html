{% extends 'base.html' %}

{% block content %}
<div class="auth-card">
    <h2>💰 ExpenseTracker</h2>
    <p class="auth-sub">Take control of your personal finances.</p>

    <div style="display:flex; flex-direction:column; gap:12px; margin-top:8px;">
        <a href="{% url 'register' %}" class="btn-primary" style="justify-content:center; text-decoration:none;">
            Create Account
        </a>
        <a href="{% url 'login' %}" class="btn-outline" style="justify-content:center; text-decoration:none;">
            Login
        </a>
    </div>

    <div style="margin-top:28px; padding-top:20px; border-top:1px solid var(--border);">
        <p style="font-size:0.75rem; color:var(--muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:.8px; font-weight:600;">Features</p>
        <div style="display:flex; flex-direction:column; gap:6px; font-size:0.84rem; color:var(--muted);">
            <div>✓ Email Verification</div>
            <div>✓ Expense Tracking</div>
            <div>✓ Budget Management</div>
            <div>✓ Dashboard Analytics</div>
            <div>✓ Password Reset</div>
            <div>✓ User Settings</div>
        </div>
    </div>
</div>
{% endblock %}
