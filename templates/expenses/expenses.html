{% extends 'base.html' %}
{% block nav_expenses %}active{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Expenses</h2>
    <p>Track and manage your spending</p>
</div>

<div id="messageDiv"></div>

<div class="grid-2" style="margin-bottom:20px;">

    <!-- ── ADD EXPENSE ── -->
    <div class="card" id="addPanel">
        <div class="section-title">Add Expense</div>
        <form id="expenseForm">
            {% csrf_token %}
            <div class="form-group">
                <label>Category</label>
                <select name="category" id="categorySelect" required>
                    <option value="">Select a category</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" name="amount" placeholder="0.00" step="0.01" min="0.01" required>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" required>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <input type="text" name="notes" placeholder="Optional notes">
            </div>
            <button type="submit" class="btn-primary">Add Expense</button>
        </form>
    </div>

    <!-- ── EDIT EXPENSE (hidden) ── -->
    <div class="card" id="editPanel" style="display:none; border:1px solid var(--yellow);">
        <div class="section-title" style="color:var(--yellow);">✏️ Edit Expense</div>
        <form id="editExpenseForm">
            {% csrf_token %}
            <input type="hidden" id="editExpenseId">
            <div class="form-group">
                <label>Category</label>
                <select name="category" id="editCategorySelect">
                    <option value="">Select a category</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" id="editAmount" name="amount" placeholder="0.00" step="0.01" min="0.01" required>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="editDate" name="date" required>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <input type="text" id="editNotes" name="notes" placeholder="Optional notes">
            </div>
            <div style="display:flex; gap:10px;">
                <button type="submit" class="btn-primary">Save Changes</button>
                <button type="button" class="btn-outline" id="cancelEditBtn">Cancel</button>
            </div>
        </form>
    </div>

    <!-- ── SEARCH ── -->
    <div class="card" id="searchPanel">
        <div class="section-title">Search</div>
        <div class="input-row">
            <div class="form-group">
                <input type="text" id="searchInput" placeholder="Search by notes...">
            </div>
            <button id="searchBtn" class="btn-outline">Search</button>
        </div>
    </div>

</div>

<!-- ── EXPENSE LIST ── -->
<div class="card">
    <div class="section-title">All Expenses</div>
    <div id="expenseList"><p class="empty-msg">Loading...</p></div>
    <div id="pagination"></div>
</div>
{% endblock %}
